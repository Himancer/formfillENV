name: FormFillEnv
version: "1.0.0"
description: >
  An OpenEnv-compatible reinforcement learning environment for AI-driven form filling
  targeting India-specific use cases: college admission, bank KYC, and hospital registration.

author: Himanshu Pandey
repository: https://huggingface.co/spaces/Himancer/FormFillEnv

environment:
  class: FormEnv
  module: env.environment
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state

observation_space:
  type: object
  fields:
    form_type: string
    required_fields: list[string]
    filled_fields: dict[string, string]
    missing_fields: list[string]
    errors: list[string]
    user_profile: dict[string, string]
    step_count: integer

action_space:
  type: object
  fields:
    action_type:
      type: string
      enum: [map_field, request_missing, infer_field, validate_field, submit_form]
    field_name:
      type: string
      required: false
    value:
      type: string
      required: false

tasks:
  - id: task_1_easy
    form_type: College Admission
    difficulty: easy
    max_steps: 12
  - id: task_2_medium
    form_type: Bank KYC
    difficulty: medium
    max_steps: 12
  - id: task_3_hard
    form_type: Hospital Registration (Linked Forms)
    difficulty: hard
    max_steps: 12

grader:
  module: env.grader
  function: grade_submission
  score_range: [0.0, 1.0]

inference:
  script: inference.py
  required_env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  max_runtime_minutes: 20

docker:
  base_image: python:3.10-slim
  port: 7860
